server:
  port: 8060 # The single port your JavaFX client will talk to now

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Route path requests for Patients
        - id: patient-service-route
          uri: lb://patient-service # "lb://" means Load Balance using Eureka names
          predicates:
            - Path=/api/patients/**

        # Route path requests for Beds / Allotments
        - id: allotment-service-route
          uri: lb://allotment-service
          predicates:
            - Path=/patients/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/ # Points to our running phonebook server